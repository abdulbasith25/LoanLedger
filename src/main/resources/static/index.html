<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Installment Management System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .section { background: #fafafa; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        form { margin-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        button.secondary { background-color: #2ecc71; margin-top: 5px; }
        button.secondary:hover { background-color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .PENDING { background: #ffeaa7; color: #d35400; }
        .PAID, .APPROVED, .DISBURSED { background: #55efc4; color: #00b894; }
        .CLOSED { background: #dfe6e9; color: #636e72; }
        #message { position: fixed; top: 20px; right: 20px; padding: 15px; border-radius: 5px; color: #fff; display: none; z-index: 1000; }
    </style>
</head>
<body>
<div id="message"></div>
<div class="container">
    <h1>Ledger-Based Loan Management</h1>

    <div class="grid">
        <!-- User management -->
        <div class="section">
            <h2>1. User & Wallet</h2>
            <form id="userForm">
                <label>Create New User (Name):</label>
                <input type="text" id="userName" placeholder="Enter name" required>
                <button type="submit">Create User</button>
            </form>
            <hr>
            <form id="depositForm">
                <label>User ID:</label>
                <input type="number" id="walletUserId" required>
                <label>Deposit Amount:</label>
                <input type="number" id="depositAmount" step="0.01" required>
                <button type="submit" class="secondary">Deposit Money</button>
            </form>
            <p>Wallet Balance: <span id="balanceSpan">0</span></p>
            <button onclick="checkBalance()">Check Balance</button>
        </div>

        <!-- Loan Products -->
        <div class="section">
            <h2>2. Loan Products (Admin)</h2>
            <form id="productForm">
                <label>Title:</label>
                <input type="text" id="prodTitle" required>
                <label>Total Amount:</label>
                <input type="number" id="prodAmount" step="0.01" required>
                <label>Interest Rate (%):</label>
                <input type="number" id="prodRate" step="0.01" required>
                <label>Tenure (Months):</label>
                <input type="number" id="prodTenure" required>
                <button type="submit">Create Product</button>
            </form>
            <button onclick="loadProducts()">List All Products</button>
            <div id="productList"></div>
        </div>
    </div>

    <div class="grid">
        <!-- Loans -->
        <div class="section">
            <h2>3. Apply & Manage Loans</h2>
            <form id="applyLoanForm">
                <label>User ID:</label>
                <input type="number" id="applyUserId" required>
                <label>Product ID:</label>
                <input type="number" id="applyProductId" required>
                <button type="submit">Apply for Loan</button>
            </form>
            <hr>
            <label>Loan ID (to Approve/Disburse/View):</label>
            <input type="number" id="targetLoanId">
            <button onclick="approveLoan()">Approve</button>
            <button onclick="disburseLoan()" class="secondary">Disburse</button>
            <button onclick="viewLoan()">View Detail</button>
            <div id="loanDetail"></div>
        </div>

        <!-- Ledger & Installments -->
        <div class="section">
            <h2>4. Ledger & Payments</h2>
            <label>User ID (to View Ledger):</label>
            <input type="number" id="viewLedgerUserId">
            <button onclick="viewLedger()">View Ledger</button>
            
            <hr>
            <label>Loan ID (to View Installments):</label>
            <input type="number" id="viewInstLoanId">
            <button onclick="viewInstallments()">View Installments</button>
            <div id="installmentList"></div>
        </div>
    </div>

    <h2>Ledger Entries</h2>
    <table id="ledgerTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Reference</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
    </table>
</div>

<script>
    const API_BASE = "http://localhost:8080";

    function showMsg(text, isError = false) {
        const msg = document.getElementById('message');
        msg.innerText = text;
        msg.style.backgroundColor = isError ? '#e74c3c' : '#2ecc71';
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    }

    // 1. User & Wallet
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const response = await fetch(`${API_BASE}/wallet/users`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: document.getElementById('userName').value})
        });
        const data = await response.json();
        showMsg(`User created! ID: ${data.id}`);
    });

    document.getElementById('depositForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const response = await fetch(`${API_BASE}/wallet/deposit`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: document.getElementById('walletUserId').value,
                amount: document.getElementById('depositAmount').value
            })
        });
        showMsg(await response.text());
        checkBalance();
    });

    async function checkBalance() {
        const userId = document.getElementById('walletUserId').value;
        if(!userId) return;
        const response = await fetch(`${API_BASE}/wallet/${userId}/balance`);
        const bal = await response.text();
        document.getElementById('balanceSpan').innerText = bal;
    }

    // 2. Products
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const response = await fetch(`${API_BASE}/loan-products`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                title: document.getElementById('prodTitle').value,
                totalAmount: document.getElementById('prodAmount').value,
                interestRate: document.getElementById('prodRate').value,
                tenureMonths: document.getElementById('prodTenure').value
            })
        });
        showMsg("Product created!");
    });

    async function loadProducts() {
        const response = await fetch(`${API_BASE}/loan-products`);
        const data = await response.json();
        document.getElementById('productList').innerHTML = data.map(p => 
            `<p><b>[${p.id}] ${p.title}</b>: $${p.totalAmount} / ${p.tenureMonths} Mo</p>`
        ).join('');
    }

    // 3. Loans
    document.getElementById('applyLoanForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const response = await fetch(`${API_BASE}/loans/apply`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userId: document.getElementById('applyUserId').value,
                loanProductId: document.getElementById('applyProductId').value
            })
        });
        const data = await response.json();
        showMsg(`Applied! Loan ID: ${data.id}`);
    });

    async function approveLoan() {
        const id = document.getElementById('targetLoanId').value;
        const response = await fetch(`${API_BASE}/loans/${id}/approve`, {method: 'POST'});
        showMsg(await response.text());
    }

    async function disburseLoan() {
        const id = document.getElementById('targetLoanId').value;
        const response = await fetch(`${API_BASE}/loans/${id}/disburse`, {method: 'POST'});
        showMsg(await response.text());
    }

    async function viewLoan() {
        const id = document.getElementById('targetLoanId').value;
        const response = await fetch(`${API_BASE}/loans/${id}`);
        const data = await response.json();
        document.getElementById('loanDetail').innerHTML = `<p>Status: <span class="status-badge ${data.status}">${data.status}</span>, Remaining: $${data.remainingAmount}</p>`;
    }

    // 4. Ledger & Installments
    async function viewLedger() {
        const userId = document.getElementById('viewLedgerUserId').value;
        const response = await fetch(`${API_BASE}/ledger/${userId}`);
        const data = await response.json();
        const body = document.getElementById('ledgerBody');
        body.innerHTML = data.map(e => 
            `<tr><td>${e.id}</td><td>${e.type}</td><td>${e.amount}</td><td>${e.referenceId}</td><td>${e.createdAt}</td></tr>`
        ).join('');
    }

    async function viewInstallments() {
        const loanId = document.getElementById('viewInstLoanId').value;
        const response = await fetch(`${API_BASE}/installments/loan/${loanId}`);
        const data = await response.json();
        const div = document.getElementById('installmentList');
        div.innerHTML = data.map(i => 
            `<div>[${i.id}] Due: ${i.dueDate} | $${i.amount} 
            <span class="status-badge ${i.status}">${i.status}</span>
            ${i.status == 'PENDING' ? `<button onclick="payInstallment(${i.id})">Pay</button>` : ''}
            </div>`
        ).join('<br>');
    }

    async function payInstallment(id) {
        try {
            const response = await fetch(`${API_BASE}/installments/pay`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({installmentId: id})
            });
            const msg = await response.text();
            if (response.ok) showMsg(msg);
            else showMsg(msg, true);
            viewInstallments();
            checkBalance();
        } catch (e) {
            showMsg("Payment Error", true);
        }
    }
</script>
</body>
</html>
